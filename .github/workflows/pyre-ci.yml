name: pyre CI

on:
  push:
    branches: [ "main", "py3.[0-9]+" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "majit/**/*"
      - "pyre/**/*"
      - "lib-python/**"
      - "scripts/install-charon.py"
      - "scripts/extract-llbc.py"
      - ".github/workflows/pyre-ci.yml"
  pull_request:
    branches: [ "main", "py3.[0-9]+" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "majit/**/*"
      - "pyre/**/*"
      - "lib-python/**"
      - "scripts/install-charon.py"
      - "scripts/extract-llbc.py"
      - ".github/workflows/pyre-ci.yml"
  workflow_dispatch:

concurrency:
  group: pyre-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cargo-fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: rustfmt
    - name: Run cargo fmt --check
      run: cargo fmt --all -- --check

  prepare-charon-llbc:
    name: prepare Charon/LLBC (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      # Redirect the shared charon/ullbc build dir INTO the workspace so
      # actions/cache can reach it. Locally PYRE_SHARED_BUILD is unset and
      # both scripts default to ../.pyre-build (shared across worktrees).
      PYRE_SHARED_BUILD: ${{ github.workspace }}/.pyre-build
      # Single source of truth for the pinned charon tag. MUST mirror
      # CHARON_VERSION_DEFAULT in scripts/install-charon.py: it drives both
      # the cache keys below AND install-charon.py's .installed-version
      # stamp, so a pin bump here misses the cache and re-installs.
      CHARON_VERSION: nightly-2026.05.29
    strategy:
      fail-fast: false
      matrix:
        # On windows-latest install-charon.py builds Charon from source
        # (no Windows release asset is published); see scripts/install-charon.py.
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        cache-bin: false
    - name: Cache Charon binary
      id: charon-cache
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        # Only the installed charon/charon-driver + .installed-version stamp —
        # all the skip check (charon_bin + stamp) and the main build need.
        # The Windows from-source tree (.pyre-build/charon-src) is NOT cached:
        # it shares this key with the binary, so it never aids a miss (a miss
        # restores nothing and rebuilds fully regardless) and only bloats the
        # entry against the repo-wide 10 GB cache budget.
        path: .pyre-build/charon
        key: charon-bin-${{ runner.os }}-${{ runner.arch }}-${{ env.CHARON_VERSION }}
        restore-keys: |
          charon-bin-${{ runner.os }}-${{ runner.arch }}-
    - name: Install Charon
      # install-charon.py self-skips on a restored stamp; the guard also
      # avoids the network round-trip / from-source rebuild on an exact hit.
      if: steps.charon-cache.outputs.cache-hit != 'true'
      shell: bash
      run: scripts/install-charon.py
    - name: Compute LLBC fingerprint
      id: llbc-fingerprint
      shell: bash
      run: |
        value="$(scripts/extract-llbc.py --fingerprint pyre-object pyre-interpreter pyre-jit)"
        echo "value=${value}" >> "$GITHUB_OUTPUT"
    - name: Cache LLBC
      id: llbc-cache
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        # One atomic entry so the three ullbc files restore together — a
        # partial restore would degrade auto-discovery to the 2-crate path.
        path: build/llbc
        # Per-OS/arch because cfg(target_os)/cfg(target_arch) bodies differ.
        # The fingerprint is computed by scripts/extract-llbc.py from the
        # Charon target crates and their local path-dependency source closure,
        # not broad pyre/** or majit/** globs.
        key: llbc-${{ runner.os }}-${{ runner.arch }}-${{ env.CHARON_VERSION }}-${{ steps.llbc-fingerprint.outputs.value }}
    - name: Extract LLBC
      # extract-llbc.py also self-skips by fingerprint; this gate avoids even
      # checking per-crate stamps when the CI cache restored the whole set.
      if: steps.llbc-cache.outputs.cache-hit != 'true'
      shell: bash
      run: scripts/extract-llbc.py pyre-object pyre-interpreter pyre-jit
    - name: Upload LLBC artifact
      # Hand the ullbc set (freshly extracted, or restored from the cache
      # above) to the downstream jobs as a run-scoped artifact. Unlike
      # actions/cache, an artifact is exempt from the repo-wide 10 GB cache
      # budget and its LRU eviction, so a small ullbc set cannot be evicted
      # between this job and a late-scheduled consumer. The LLBC cache above
      # is kept only to skip re-extraction across runs.
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: llbc-${{ runner.os }}-${{ runner.arch }}
        path: build/llbc
        retention-days: 1
        if-no-files-found: error

  cargo-test:
    name: cargo test (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    needs: prepare-charon-llbc
    if: ${{ always() }}
    env:
      # See prepare-charon-llbc: keep the restored Charon install in the
      # workspace so scripts/builds find the same platform-specific path.
      PYRE_SHARED_BUILD: ${{ github.workspace }}/.pyre-build
      CHARON_VERSION: nightly-2026.05.29
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
        backend: [dynasm, cranelift]

    steps:
    - name: Check prepare-charon-llbc result
      if: ${{ needs.prepare-charon-llbc.result != 'success' }}
      shell: bash
      run: |
        echo "prepare-charon-llbc did not succeed: ${{ needs.prepare-charon-llbc.result }}" >&2
        exit 1
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        cache-bin: false
    - name: Restore Charon binary
      id: restore-charon
      uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: .pyre-build/charon
        key: charon-bin-${{ runner.os }}-${{ runner.arch }}-${{ env.CHARON_VERSION }}
    - name: Check prepared Charon cache hit
      # Charon's cache key is shared repo-wide per OS/arch (no per-run
      # fingerprint), so it stays LRU-warm and rarely evicts; the LLBC set
      # is handed over as a run-scoped artifact below instead.
      if: ${{ steps.restore-charon.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        echo "Charon cache miss from prepare-charon-llbc" >&2
        echo "Charon cache hit: ${{ steps.restore-charon.outputs.cache-hit }}" >&2
        exit 1
    - name: Download LLBC artifact
      # Run-scoped handoff from prepare-charon-llbc. Unlike actions/cache,
      # an artifact is exempt from the repo-wide 10 GB cache budget and its
      # LRU eviction, so a small ullbc set cannot vanish between prepare and
      # a late-scheduled consumer (the macOS legs start well after the
      # Linux/Windows legs — long enough for a cached entry to be evicted).
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: llbc-${{ runner.os }}-${{ runner.arch }}
        path: build/llbc
    - name: Verify prepared Charon/LLBC
      shell: bash
      run: |
        test -d .pyre-build/charon
        test -s build/llbc/pyre-object.ullbc
        test -s build/llbc/pyre-interpreter.ullbc
        test -s build/llbc/pyre-jit.ullbc
    - name: Free up runner disk space
      if: runner.os == 'Linux'
      shell: bash
      # `cargo test --all` builds every workspace member, and the majit
      # demo interpreters (tlr/tl/tla/tiny2/tiny3/tinyframe/braininterp/
      # tlc/calc) plus the wasm crates each statically link the full
      # selected backend. On the cranelift leg those extra binaries
      # overflow the ubuntu runner's default free disk during the link
      # (`No space left on device` -> ld terminates with SIGBUS). Reclaim
      # the preinstalled toolchains CI never uses (~20+ GB) so the whole
      # workspace's tests build and run instead of excluding crates.
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
          /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/local/share/boost
        sudo docker image prune --all --force || true
        df -h /
    - name: Run cargo test for ${{ matrix.backend }}
      env:
        BACKEND: ${{ matrix.backend }}
      run: cargo test --all --no-default-features --features "$BACKEND"

  pyre-check:
    name: pyre/check.py (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: prepare-charon-llbc
    if: ${{ always() }}
    env:
      # See prepare-charon-llbc: restore the shared build dir into the
      # workspace and use the same Charon pin/cache key.
      PYRE_SHARED_BUILD: ${{ github.workspace }}/.pyre-build
      CHARON_VERSION: nightly-2026.05.29
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
    - name: Check prepare-charon-llbc result
      if: ${{ needs.prepare-charon-llbc.result != 'success' }}
      shell: bash
      run: |
        echo "prepare-charon-llbc did not succeed: ${{ needs.prepare-charon-llbc.result }}" >&2
        exit 1
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - name: Set up CPython
      id: cpython
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.14"
    - name: Set up PyPy
      id: pypy
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "pypy3.11"
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        cache-bin: false
    - name: Restore Charon binary
      id: restore-charon
      uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: .pyre-build/charon
        key: charon-bin-${{ runner.os }}-${{ runner.arch }}-${{ env.CHARON_VERSION }}
    - name: Check prepared Charon cache hit
      # Charon's cache key is shared repo-wide per OS/arch (no per-run
      # fingerprint), so it stays LRU-warm and rarely evicts; the LLBC set
      # is handed over as a run-scoped artifact below instead.
      if: ${{ steps.restore-charon.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        echo "Charon cache miss from prepare-charon-llbc" >&2
        echo "Charon cache hit: ${{ steps.restore-charon.outputs.cache-hit }}" >&2
        exit 1
    - name: Download LLBC artifact
      # Run-scoped handoff from prepare-charon-llbc. Unlike actions/cache,
      # an artifact is exempt from the repo-wide 10 GB cache budget and its
      # LRU eviction, so a small ullbc set cannot vanish between prepare and
      # a late-scheduled consumer (the macOS legs start well after the
      # Linux/Windows legs — long enough for a cached entry to be evicted).
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: llbc-${{ runner.os }}-${{ runner.arch }}
        path: build/llbc
    - name: Verify prepared Charon/LLBC
      shell: bash
      run: |
        test -d .pyre-build/charon
        test -s build/llbc/pyre-object.ullbc
        test -s build/llbc/pyre-interpreter.ullbc
        test -s build/llbc/pyre-jit.ullbc
    - name: Run pyre/check.py
      env:
        PYRE_CHECK_PYTHON3: ${{ steps.cpython.outputs.python-path }}
        PYRE_CHECK_PYPY3: ${{ steps.pypy.outputs.python-path }}
      run: ${{ steps.cpython.outputs.python-path }} pyre/check.py

  cpython-tests:
    name: CPython suite (gate)
    # aarch64: the baseline is recorded on darwin-aarch64 and the JIT codegen is
    # arch-specific, so the gate runs where the baseline was observed.
    # macos-latest is the only aarch64 OS in prepare-charon-llbc's matrix, so its
    # Charon/LLBC caches (keyed by runner.os-runner.arch) are already prepared.
    runs-on: macos-latest
    needs: prepare-charon-llbc
    if: ${{ always() }}
    timeout-minutes: 30
    env:
      # See prepare-charon-llbc: restore the shared build dir into the
      # workspace and use the same Charon pin/cache key.
      PYRE_SHARED_BUILD: ${{ github.workspace }}/.pyre-build
      CHARON_VERSION: nightly-2026.05.29
    steps:
    - name: Check prepare-charon-llbc result
      if: ${{ needs.prepare-charon-llbc.result != 'success' }}
      shell: bash
      run: |
        echo "prepare-charon-llbc did not succeed: ${{ needs.prepare-charon-llbc.result }}" >&2
        exit 1
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - name: Set up CPython
      id: cpython
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.14"
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        cache-bin: false
    - name: Restore Charon binary
      id: restore-charon
      uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: .pyre-build/charon
        key: charon-bin-${{ runner.os }}-${{ runner.arch }}-${{ env.CHARON_VERSION }}
    - name: Check prepared Charon cache hit
      # Charon's cache key is shared repo-wide per OS/arch (no per-run
      # fingerprint), so it stays LRU-warm and rarely evicts; the LLBC set
      # is handed over as a run-scoped artifact below instead.
      if: ${{ steps.restore-charon.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        echo "Charon cache miss from prepare-charon-llbc" >&2
        echo "Charon cache hit: ${{ steps.restore-charon.outputs.cache-hit }}" >&2
        exit 1
    - name: Download LLBC artifact
      # Run-scoped handoff from prepare-charon-llbc. Unlike actions/cache,
      # an artifact is exempt from the repo-wide 10 GB cache budget and its
      # LRU eviction, so a small ullbc set cannot vanish between prepare and
      # a late-scheduled consumer (the macOS legs start well after the
      # Linux/Windows legs — long enough for a cached entry to be evicted).
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: llbc-${{ runner.os }}-${{ runner.arch }}
        path: build/llbc
    - name: Verify prepared Charon/LLBC
      shell: bash
      run: |
        test -d .pyre-build/charon
        test -s build/llbc/pyre-object.ullbc
        test -s build/llbc/pyre-interpreter.ullbc
        test -s build/llbc/pyre-jit.ullbc
    - name: Build pyre-dynasm
      run: cargo build --release -p pyrex --bin pyre-dynasm --no-default-features --features dynasm
    - name: Run CPython suite (gate regressions, JIT on)
      run: ${{ steps.cpython.outputs.python-path }} pyre/cpython_tests/run.py --backend dynasm --baseline pyre/cpython_tests/baseline.json --jobs 4 --timeout 120

  wasm-build:
    name: wasm build (pyre-wasm, ${{ matrix.binding }})
    runs-on: ubuntu-24.04
    needs: prepare-charon-llbc
    if: ${{ always() }}
    env:
      # See prepare-charon-llbc: keep the restored Charon install in the
      # workspace and reuse the same pin/cache key. pyre-wasm pulls pyre-jit,
      # whose build needs the extracted LLBC.
      PYRE_SHARED_BUILD: ${{ github.workspace }}/.pyre-build
      CHARON_VERSION: nightly-2026.05.29
    strategy:
      fail-fast: false
      matrix:
        # web = wasm-bindgen / browser host; wasmi = plain C-ABI for a
        # native (wasmi / wasmtime) embedder. Both target wasm32.
        binding: [web, wasmi]

    steps:
    - name: Check prepare-charon-llbc result
      if: ${{ needs.prepare-charon-llbc.result != 'success' }}
      shell: bash
      run: |
        echo "prepare-charon-llbc did not succeed: ${{ needs.prepare-charon-llbc.result }}" >&2
        exit 1
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        targets: wasm32-unknown-unknown
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        cache-bin: false
    - name: Compute LLBC fingerprint
      id: llbc-fingerprint
      shell: bash
      run: |
        value="$(scripts/extract-llbc.py --fingerprint pyre-object pyre-interpreter pyre-jit)"
        echo "value=${value}" >> "$GITHUB_OUTPUT"
    - name: Restore Charon binary
      id: restore-charon
      uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: |
          .pyre-build/charon
          .pyre-build/charon-src
        key: charon-bin-${{ runner.os }}-${{ runner.arch }}-${{ env.CHARON_VERSION }}
    - name: Restore LLBC
      id: restore-llbc
      uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
      with:
        path: build/llbc
        key: llbc-${{ runner.os }}-${{ runner.arch }}-${{ env.CHARON_VERSION }}-${{ steps.llbc-fingerprint.outputs.value }}
    - name: Check prepared cache hits
      if: ${{ steps.restore-charon.outputs.cache-hit != 'true' || steps.restore-llbc.outputs.cache-hit != 'true' }}
      shell: bash
      run: |
        echo "cache miss from prepare-charon-llbc" >&2
        echo "Charon cache hit: ${{ steps.restore-charon.outputs.cache-hit }}" >&2
        echo "LLBC cache hit: ${{ steps.restore-llbc.outputs.cache-hit }}" >&2
        exit 1
    - name: Verify prepared Charon/LLBC
      shell: bash
      run: |
        test -d .pyre-build/charon
        test -s build/llbc/pyre-object.ullbc
        test -s build/llbc/pyre-interpreter.ullbc
        test -s build/llbc/pyre-jit.ullbc
    - name: Build pyre-wasm (${{ matrix.binding }})
      shell: bash
      run: |
        cargo build -p pyre-wasm --target wasm32-unknown-unknown \
          --no-default-features --features "${{ matrix.binding }}"
