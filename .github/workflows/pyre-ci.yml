name: pyre CI

on:
  push:
    branches: [ "main", "py3.[0-9]+" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "majit/**/*"
      - "pyre/**/*"
      - ".github/workflows/pyre-ci.yml"
  pull_request:
    branches: [ "main", "py3.[0-9]+" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "majit/**/*"
      - "pyre/**/*"
      - ".github/workflows/pyre-ci.yml"
  workflow_dispatch:

concurrency:
  group: pyre-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cargo-fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: rustfmt
    - name: Run cargo fmt --check
      run: cargo fmt --all -- --check

  cargo-test:
    name: cargo test (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
        backend: [dynasm, cranelift]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        cache-bin: false
    - name: Run cargo test for ${{ matrix.backend }}
      run: cargo test --all --no-default-features --features ${{ matrix.backend }}

  pyre-check:
    name: pyre/check.py (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - name: Set up CPython
      id: cpython
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "3.14"
    - name: Set up PyPy
      id: pypy
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: "pypy3.11"
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        cache-bin: false
    - name: Run pyre/check.py
      env:
        PYRE_CHECK_PYTHON3: ${{ steps.cpython.outputs.python-path }}
        PYRE_CHECK_PYPY3: ${{ steps.pypy.outputs.python-path }}
      run: ${{ steps.cpython.outputs.python-path }} pyre/check.py
