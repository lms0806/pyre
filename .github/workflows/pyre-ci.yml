name: pyre CI

on:
  push:
    branches: [ "main", "py3.[0-9]+" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "majit/**/*"
      - "pyre/**/*"
      - ".github/workflows/pyre-ci.yml"
  pull_request:
    branches: [ "main", "py3.[0-9]+" ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "majit/**/*"
      - "pyre/**/*"
      - ".github/workflows/pyre-ci.yml"
  workflow_dispatch:

concurrency:
  group: pyre-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  cargo-fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      with:
        components: rustfmt
    - name: Run cargo fmt --check
      run: cargo fmt --all -- --check

  cargo-test:
    name: cargo test (${{ matrix.os }}, ${{ matrix.backend }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]
        backend: [dynasm, cranelift]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
    - name: Run cargo test for ${{ matrix.backend }}
      run: cargo test --all --no-default-features --features ${{ matrix.backend }}

  pyre-check:
    name: pyre/check.py (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - name: Set up CPython
      id: cpython
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.14"
    - name: Set up PyPy
      id: pypy
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "pypy3.11"
    - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
    - name: Run pyre/check.py
      env:
        PYRE_CHECK_PYTHON3: ${{ steps.cpython.outputs.python-path }}
        PYRE_CHECK_PYPY3: ${{ steps.pypy.outputs.python-path }}
      run: ${{ steps.cpython.outputs.python-path }} pyre/check.py
