name: Translate PyPy
# Suppressed in automatic CI: this project now maintains pyre/majit
# independently from upstream PyPy. The job stays defined so existing required
# checks can resolve as skipped; maintainers can opt in via manual dispatch.

on:
  push:
    branches: [ "main", "py3.[0-9]+"]
  pull_request:
    branches: [ "main", "py3.[0-9]+"]
  workflow_dispatch:
    inputs:
      run_legacy_translation:
        description: "Run the suppressed legacy PyPy translation job"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_legacy_translation }}

    name: build on ${{ matrix.os }}${{ matrix.revdb && ' (with RevDB)' || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        revdb: [false, true]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 1

    - name: Set up PyPy 2.7
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "pypy-2.7-v7.3.17"
        cache: 'pip' # caching pip dependencies

    - name: install system dependencies
      uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17 # v1.5.3
      with:
        packages: libffi-dev pkg-config zlib1g-dev libbz2-dev libsqlite3-dev libncurses5-dev libexpat1-dev libssl-dev libgdbm-dev tk-dev libgc-dev liblzma-dev libncursesw5-dev patchelf
        version: 1.0

    - name: run objspace unit tests
      run: |
        pypy -m pip install -r requirements.txt
        pypy pytest.py pypy/objspace -v -m "not flaky"

    - name: translate
      run: |
        pypy rpython/bin/rpython ${{ matrix.revdb && '-O2 --revdb' || '-Ojit' }} pypy/goal/targetpypystandalone.py ${{ matrix.revdb && '--withoutmod-_hpy_universal' }}
        mv pypy*-c libpypy*-c.so pypy/goal/

    - name: package
      run: |
        ./pypy/goal/pypy*-c pypy/tool/release/package.py --make-portable --target=.

    - name: upload
      if: success() || failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: pypy-ci-build-${{ matrix.os }}${{ matrix.revdb && '-revdb' || '' }}
        path: ./pypy-nightly.tar.bz2
